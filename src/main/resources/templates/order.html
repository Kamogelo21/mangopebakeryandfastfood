<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order 💗</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">

        <a href="/" class="logo-link">
            <img th:src="@{/images/logo1.png}" alt="Logo" class="logo">
        </a>

        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/menu}">Menu</a>
            <a th:href="@{/order}">Order</a>
            <a th:href="@{/about}">About</a>
            <a th:href="@{/contact}">Contact</a>
        </div>
    </div>
</nav>

<div class="order-title">
    <h1>Place Your Order 💗</h1>

    <form th:action="@{/submitOrder}" method="post" th:object="${order}">

        <!-- Name -->
        <input type="text" th:field="*{name}" placeholder="Your Name" required><br>

        <!-- Phone Number -->
        <input type="text" th:field="*{phone}" placeholder="Phone Number" required><br><br>

        <h3>Select Items & Quantities</h3>

        <!-- Assorted Biscuits -->
        <div class="order-item-row">
            <label>Assorted Biscuits</label>

            <select name="assortedBiscuitsSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="assortedBiscuitsQty" min="0" placeholder="Qty">
        </div>

        <!-- Eat Sumore -->
        <div class="order-item-row">
            <label>Eat Sumore</label>

            <select name="eatsumoreSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="eatsumoreQty" min="0" placeholder="Qty">
        </div>

        <!-- Flavoured Scones -->
        <div class="order-item-row">
            <label>Flavoured Scones</label>

            <select name="flavouredSconesSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="flavouredSconesQty" min="0" placeholder="Qty">
        </div>

        <!-- Ginger Biscuits -->
        <div class="order-item-row">
            <label>Ginger Biscuits</label>

            <select name="gingerBiscuitsSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="gingerBiscuitsQty" min="0" placeholder="Qty">
        </div>

        <!-- Jam Tarts -->
        <div class="order-item-row">
            <label>Jam Tarts</label>

            <select name="jamTartsSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="jamTartsQty" min="0" placeholder="Qty">
        </div>

        <div class="order-item-row">
            <label>Lamingtons</label>

            <select name="lamingtonsSize">
                <option value="">Size</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="lamingtonsQty" min="0" placeholder="Qty">
        </div>

        <!-- Lemon Creams -->
        <div class="order-item-row">
            <label>Lemon Creams</label>

            <select name="lemonCreamsSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="lemonCreamsQty" min="0" placeholder="Qty">
        </div>

        <!-- Melting Moments -->
        <div class="order-item-row">
            <label>Melting Moments</label>

            <select name="meltingMomentsSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="meltingMomentsQty" min="0" placeholder="Qty">
        </div>

        <!-- Queens Cakes -->
        <div class="order-item-row">
            <label>Queens Cakes</label>

            <select name="queensCakesSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="queensCakesQty" min="0" placeholder="Qty">
        </div>

        <!-- Romany Creams -->
        <div class="order-item-row">
            <label>Romany Creams</label>

            <select name="romanyCreamsSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="romanyCreamsQty" min="0" placeholder="Qty">
        </div>

        <!-- Snowballs -->
        <div class="order-item-row">
            <label>Snowballs / Red Cake</label>

            <select name="snowballsSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="snowballsQty" min="0" placeholder="Qty">
        </div>

        <!-- Plain Scones -->
        <div class="order-item-row">
            <label>Plain Scones</label>

            <select name="plainSconesSize">
                <option value="">Size</option>
                <option value="5L">5L</option>
                <option value="10L">10L</option>
                <option value="20L">20L</option>
            </select>

            <input type="number" name="plainSconesQty" min="0" placeholder="Qty">
        </div>

        <p class="notice" style="color: red; font-size: 14px;">
            ⚠ Orders require at least a day's notice. We will reach out to you to confirm details.
        </p>

        <button type="submit">Order 💕</button>
    </form>
</div>

<script src="/js/order.js"></script>

<footer>
        <div class="footer-contacts">
            <p> For inquiries: </p>
            <a href="https://wa.me/27685962483" target="_blank">
                <img src="/images/whatsapp.jpg" alt="WhatsApp" class="footer-icon">
                <p> WhatsApp us </p>
            </a>
            <a href="mailto:ashleymotapane1@outlook.com">
                <img src="/images/email.jpg" alt="Email" class="footer-icon">
                <p> Email us </p>
            </a>
        </div>

        <p class="footer-copy">
            &copy; 2026 Mangope Bakery & Fast Food. All Rights Reserved.
        </p>
</footer>
</body>
</html>
