<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order 💗</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <a th:href="@{/}">Home</a>
    <a th:href="@{/menu}">Menu</a>
    <a th:href="@{/order}">Order</a>
    <a th:href="@{/about}">About</a>
</nav>

<div class="order-title">
    <h1>Place Your Order 💗</h1>

    <form th:action="@{/submitOrder}" method="post" th:object="${order}">

        <!-- Name -->
        <input type="text" th:field="*{name}" placeholder="Your Name" required><br>

        <!-- Phone Number -->
        <input type="text" th:field="*{phone}" placeholder="Phone Number" required>

        <!-- Item Dropdown -->
        <select th:field="*{item}" id="itemSelect" required>
            <option value="">Select Item</option>
            <option value="Plain Scones">Plain Scones</option>
            <option value="Flavoured Scones">Flavoured Scones</option>
            <option value="Queens Cakes">Queens Cakes</option>
            <option value="Snowballs">Snowballs / Red Cake</option>
            <option value="Jam Tarts">Jam Tarts</option>
            <option value="Melting Moments">Melting Moments</option>
            <option value="Romany Creams">Romany Creams</option>
            <option value="Ginger Biscuits">Ginger Biscuits</option>
            <option value="Lemon Creams">Lemon Creams</option>
            <option value="Lamingtons">Lamingtons</option>
            <option value="Eat-sumore">Eat-sumore</option>
            <option value="Assorted Biscuits">Assorted Biscuits</option>
        </select><br>

        <!-- Size Dropdown -->
        <select th:field="*{size}" id="sizeSelect" required>
            <option value="">Select Size</option>
            <option value="5">5L</option>
            <option value="10">10L</option>
            <option value="20">20L</option>
        </select>

        <p class="notice" style="color: red; font-size: 14px;">
            ⚠ Orders require at least 2 weeks notice. We will reach out to you to confirm details.
        </p>

        <button type="submit">Order 💕</button>
        <p>

        </p>
    </form>
</div>

<script src="/js/order.js"></script>

<footer>
        <div class="footer-contacts">
            <p> For inquiries: </p>
            <a href="https://wa.me/27685962483" target="_blank">
                <img src="/images/whatsapp.jpg" alt="WhatsApp" class="footer-icon">
                <p> WhatsApp us </p>
            </a>
            <a href="mailto:ashleymotapane1@outlook.com">
                <img src="/images/email.jpg" alt="Email" class="footer-icon">
                <p> Email us </p>
            </a>
        </div>

        <p class="footer-copy">
            &copy; 2026 Mangope Bakery & Fast Food. All Rights Reserved.
        </p>
</footer>
</body>
</html>
