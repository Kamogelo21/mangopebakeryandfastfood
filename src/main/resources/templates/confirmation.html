<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Confirmation 💗</title>
    <link rel="stylesheet" th:href="{@/styles.css}">
</head>
<body>

<nav>
    <a href="/">Home</a>
</nav>

<div class="container">
    <div class="card">
        <h1>Thank you 💕</h1>

        <p><strong>Name:</strong> <span th:text="${order.name}"></span></p>
        <p><strong>Item:</strong> <span th:text="${order.item}"></span></p>
        <p><strong>Quantity:</strong> <span th:text="${order.quantity}"></span></p>

        <a href="/"><button>Back Home</button></a>
    </div>
</div>

</body>
</html>
