<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Confirmation 💗</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <a href="/">Home</a>
</nav>

<div class="confirmation-box">
    <div class="card">
        <h1>Thank you 💕</h1>

        <p><strong>Name:</strong> <span th:text="${order.name}"></span></p>
        <p><strong>Item:</strong> <span th:text="${order.item}"></span></p>
        <p><strong>Size:</strong> <span th:text="${order.size}"></span></p>
        <p><strong>Phone:</strong> <span th:text="${order.phone}"></span></p>
        <p>
            Thank you for your order 💗
            We will contact you shortly to confirm your order details.
            Please note: Orders require at least 2 weeks notice.
        </p>
        <a href="/"><button>Back Home</button></a>
    </div>
</div>

</body>
</html>
