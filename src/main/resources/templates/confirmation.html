<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation 💗</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <a href="/">Home</a>
</nav>

<div class="confirmation-box">
    <div class="card">
        <h1>Thank you 💕</h1>

        <p><strong>Name:</strong> <span th:text="${order.name}"></span></p>
        <p><strong>Item:</strong> <span th:text="${order.item}"></span></p>
        <p><strong>Size:</strong> <span th:text="${order.size}"></span></p>
        <p><strong>Phone:</strong> <span th:text="${order.phone}"></span></p>
        <p>
            Thank you for your order 💗
            We will contact you shortly to confirm your order details.
            Please note: Orders require at least 2 weeks notice.
        </p>
        <a href="/"><button>Back Home</button></a>
    </div>
</div>

<footer>
    <div class="footer-contacts">
        <p> For inquiries: </p>
        <a href="https://wa.me/27685962483" target="_blank">
            <img src="/images/whatsapp.jpg" alt="WhatsApp" class="footer-icon">
            <p> WhatsApp us </p>
        </a>
        <a href="mailto:ashleymotapane1@outlook.com">
            <img src="/images/email.jpg" alt="Email" class="footer-icon">
            <p> Email us </p>
        </a>
    </div>

    <p class="footer-copy">
        &copy; 2026 Mangope Bakery & Fast Food. All Rights Reserved.
    </p>
</footer>
</body>
</html>
